name: Claude Code Review

# 使用 pull_request_target 而不是 pull_request,目的是让 fork 来的 PR
# 也能跑自动 review:
#   * pull_request 触发时,fork PR 拿不到 secrets(CLAUDE_CODE_OAUTH_TOKEN),
#     action 内部还会做触发者写权限校验,fork 作者会被直接拒绝。
#   * pull_request_target 在 base 仓库的可信上下文里跑,可以读取 secrets,
#     并以 base 仓库 collaborator 的视角调用 action。
#
# 安全注意事项:
#   * 这个工作流只用来"读取 PR diff 让 Claude 评审",不要在这里执行 PR
#     带来的代码(不要跑构建/测试/install 脚本/动态加载 PR 内的脚本),
#     否则会变成典型的 pull_request_target 提权漏洞。
#   * checkout 时显式指定 PR 的 head SHA,只是为了让 Claude 能看到 PR
#     代码本身,后续步骤里不要 `npm ci` / `cargo run` / `bash ./xxx.sh`
#     这类会执行 PR 源码的命令。
#   * 如果以后要在这里加构建/跑测试的步骤,请改回 pull_request 或者加上
#     仓库维护者 approve(label / environment)守卫。

on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          # 切到 PR 的 head commit,这样 Claude 才能 review 到 PR 改动的代码。
          # 注意:不要在后续步骤里执行这里 checkout 出来的任何脚本。
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: "/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
